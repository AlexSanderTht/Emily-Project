{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro no Download</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
        .container { max-width: 920px; margin: 0 auto; }
        h1 { font-size: 22px; color: #b00020; }
        pre { background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
        .meta { color: #555; margin-top: 8px; font-size: 14px; }
        a.btn { display: inline-block; margin-top: 16px; background: #1976d2; color: white; padding: 10px 14px; text-decoration: none; border-radius: 4px; }
        a.btn:hover { background: #125a9c; }
    </style>
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
    <meta http-equiv="Cache-Control" content="no-store" />
</head>
<body>
<div class="container">
    <h1>{{ error_title }}</h1>
    <div class="meta">ID da tarefa: {{ task_id }}</div>
    <p>Ocorreram problemas ao gerar o arquivo. Detalhes abaixo:</p>
    <pre>{{ error_details }}</pre>
    <a class="btn" href="/app">Voltar</a>
  </div>
</body>
</html>
