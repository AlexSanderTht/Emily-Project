<style>
  .color_card_notification {
      background-color: var(--bg-color);
  }
  .loader_task_notify {
      border: 2px solid rgba(243, 243, 243, 0.1);
      border-radius: 50%;
      border-top: 2px solid #fd7e14;
      width: 15px;
      height: 15px;
      -webkit-animation: spin 0.4s linear infinite; /* Safari */
      animation: spin 0.4s linear infinite;
  }

  @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
  }


  .lds-ripple {
      display: inline-block;
      position: relative;
      width: 80px;
      height: 80px;
  }
  .lds-ripple div {
      position: absolute;
      border: 4px solid #fff;
      opacity: 1;
      border-radius: 50%;
      animation: lds-ripple 1s cubic-bezier(0, 0.2, 0.8, 1) infinite;
  }
  .lds-ripple div:nth-child(2) {
      animation-delay: -0.5s;
  }

  @keyframes lds-ripple {
      0% {
          top: 36px;
          left: 36px;
          width: 0;
          height: 0;
          opacity: 0;
      }
      4.9% {
          top: 36px;
          left: 36px;
          width: 0;
          height: 0;
          opacity: 0;
      }
      5% {
          top: 36px;
          left: 36px;
          width: 0;
          height: 0;
          opacity: 1;
      }
      100% {
          top: 0px;
          left: 0px;
          width: 72px;
          height: 72px;
          opacity: 0;
      }
  }

  .paginationjs .paginationjs-pages li.active {

  }

  .w-70 {

      max-height: 400px;

    setInterval(async function() {

                headers: {
                    'X-CSRFToken': csrf_,
                    'Content-Type': 'application/json',
                },
                dataType: 'json',
                body: JSON.stringify({ 'task_ids': list_tasks_ids })
            });
            if (response.ok) {
                const taskResultData = await response.json();
                taskResultData.tasks.forEach(task => {
                    const progress = task.progress || 0;
                    updateTaskProgress(task.id, progress, task.status);
                });
                document.getElementById('tasks_number').innerHTML =  `Fila de Task: n° ${taskResultData.qtd_tasks}`
                
                // Controla a exibição das animações baseado na quantidade de tasks
                const loaderElement = document.getElementById('loader_task_ctrl_user');
                const notificationElement = document.getElementById('notification_task_ctrl_user');
                
                if (taskResultData.qtd_tasks > 0) {
                    // Mostra animações quando há tasks
                    loaderElement.style.display = 'block';
                    notificationElement.style.display = 'inline-block';
                } else {
                    // Esconde animações quando não há tasks
                    loaderElement.style.display = 'none';
                    notificationElement.style.display = 'none';
                }

                // Update your UI with taskResultData
            } else {
                console.error("Failed to fetch task results.");
            }
        } catch (error) {
            console.error("Error fetching task results:", error);
        }

    function updateTaskProgress(taskId, progress, status) {
        const taskItem = document.getElementById(`progress-bar-${taskId}`);
        if (taskItem) {
            taskItem.style.width = `${progress}%`;
            taskItem.setAttribute("aria-valuenow", progress);
            taskItem.textContent = `${progress}% - ${status}`;
            taskItem.style.backgroundColor = "blue";
            if (status === 'SUCCESS') {
                taskItem.style.backgroundColor = "green";
                taskItem.style.width = `100%`;
                taskItem.textContent = `100% - ${status}`
            } else if (status === 'FAILURE') {
                taskItem.style.width = `100%`;
                taskItem.textContent = `100% - ${status}`
                taskItem.style.backgroundColor = "purple"
            }else if (status === 'REVOKED') {
                taskItem.style.width = `100%`;
                taskItem.textContent = `100% - ${status}`
                taskItem.style.backgroundColor = "gray"
            }
        }
    }

    function initializeWebSocketTaskResult(){
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        let host = window.location.host;
        let port = ':8001';
        console.log(host)
        if (host === 'localhost:8000'){

            host = 'localhost';
        }
        ws_t = new WebSocket(`${protocol}${host}${port}/ws/task-progress/`);

        ws_t.onmessage = function(event) {
            const data = JSON.parse(event.data);
            data.tasks.forEach(task => {
                const progress = task.progress || 0;
                updateTaskProgress(task.id, progress, task.status);
            });
            document.getElementById('tasks_number').innerHTML =  `Fila de Task: n° ${data.qtd_tasks}`
        };
        ws_t.onerror = function(error) {
            console.error("WebSocket Taks error:", error);
        };

        ws_t.onclose = function() {
            console.log("WebSocket Taks connection closed");
        };

        ws_t.onopen = function () {
            console.log("WebSocket Taks Opened")
        }
    }

    function openInNewTab(url) {
        let link = document.createElement("a");
        link.download = 'File'; // <- name instead of 'name'
        link.href = url;
        link.click();
        link.remove();

    }
    function downloadTaskFile(taskId) {
        const protocol = window.location.protocol
        // Perform a HEAD request to check if the file is available
        $.ajax({
            url: `/app/a1hub/download/${taskId}/`,
            type: 'HEAD',  // Using HEAD to check availability
            method: "GET",
            success: function() {
                // If the file exists, trigger the download by navigating to the URL
                openInNewTab(`${protocol}//${window.location.host}/app/a1hub/download/${taskId}/`);
            },
            error: function() {
                swalAlert("Atenção!", 'Arquivo não encontrado', 'error', false);
            }
        });
    }

    function revokeTask(taskId) {
        $.ajax({
            url: `/app/a1hub/revoke-task/${taskId}/`,  // URL for the centralized revocation view
            type: 'HEAD',
            method: "GET",
            success: function(response) {
                swalAlert("Atenção!", response.message, 'error', false);
            },
            error: function(xhr) {
                const response = xhr.responseJSON;
                swalAlert("Atenção!", response ? response.message : "Error revoking task.",  response ? response.status: 'error', false);
            }
        });
    }

  // --------------------- Alert para notificar usuario ---------------------//
    function swalAlert(titulo, texto, icone_img, btn){
        swal({
            title: titulo,
            text: texto,
            icon: icone_img,
            button: btn,
        })
        $('div.swal-modal').addClass('bordas')
        $('div.swal-title').addClass('h4')
        $('button.swal-button').addClass('btn btn-primary px-5 rounded-pill')
        $('div.swal-text').addClass('text-center')
        $('div.swal-footer').addClass('d-flex justify-content-center')
    }

    var button = document.getElementById('filter_tasks');
    button.addEventListener('click', function() {
        var button = document.getElementById('filter_tasks');

        // Remove a classe de animação anterior
        button.classList.remove('animate__flipInY');

        // Toggle entre as classes e o conteúdo
        if (button.classList.contains('btn-outline-light')) {
            button.classList.remove('btn-outline-light');
            button.classList.add('btn-primary');
            button.innerHTML = '<i class="fa-solid fa-users-line"></i> Todas tasks';
            document.getElementById('list_tasks_user').innerHTML = ''
            // initializeWebSocket(0)
            id_for_request = 0

        } else {
            button.classList.remove('btn-primary');
            button.classList.add('btn-outline-light');
            button.innerHTML = '<i class="fa-solid fa-person-walking-luggage"></i> Minhas tasks';
            document.getElementById('list_tasks_user').innerHTML = ''
            // initializeWebSocket(user_id)
            id_for_request = user_id
        }
        // Adiciona a classe de animação após um pequeno intervalo para garantir a remoção da classe anterior
        setTimeout(function() {
            button.classList.add('animate__flipInY');
        }, 10);
    });

    // Remove a classe de animação após a conclusão da animação
    button.addEventListener('animationend', function() {
        button.classList.remove('animate__flipInY');
    });

    async function verifySession() {
    try {
        const response = await fetch('/check-session/');
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }

        let data = await response.json();
        // If session is not active, redirect to the home page
        if (!data.session_active) {
            window.location.href = '/';
        }
    } catch (error) {
        console.error('Error checking session:', error);
    }
}
