<div class="modal fade" id="modal_create_new_project" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Novo Projeto</h5>
        <button type="button" class="close" onclick="$('#modal_create_new_project').modal('hide');window.location.reload()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row mx-3">
          <label for="new_proj_name">Nome do Projeto:</label>
          <input type="text" class="form-control" id="new_proj_name" onkeyup="VerifyNameProj(this)" onchange="VerifyNameProj(this)" onclick="VerifyNameProj(this)">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CreateNewProj()">Criar</button>
        <button type="button" class="btn btn-secondary" onclick="$('#modal_create_new_project').modal('hide');window.location.reload()">Fechar</button>
      </div>
    </div>
  </div>
</div>
