<div class="modal fade" id="modal_edit_project" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true" data-backdrop="static">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Editar Projeto</h5>
        <button type="button" class="close" onclick="$('#modal_edit_project').modal('hide');window.location.reload()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row mx-3">
          <label for="edit_proj_name">Nome do Projeto:</label>
          <input type="text" class="form-control" id="edit_proj_name" onkeyup="VerifyNameProj(this)" onchange="VerifyNameProj(this)" onclick="VerifyNameProj(this)">
          <input type="text" class="form-control" id="id_proj_selected" hidden>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="UpdateProj()">Atualizar</button>
        <button type="button" class="btn btn-secondary" onclick="$('#modal_edit_project').modal('hide');window.location.reload()">Fechar</button>
      </div>
    </div>
  </div>
</div>
