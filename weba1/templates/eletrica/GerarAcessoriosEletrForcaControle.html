{% load static %}

<style>
    /* CSS personalizado para o segundo backdrop */
    .second-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* Cor de fundo cinza com 50% de opacidade */
      z-index: 1050; /* Certifique-se de que está abaixo do modal, mas acima do primeiro backdrop */
    }


    /* Custom scrollbar styles */
        .modal-body::-webkit-scrollbar {
            width: 12px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background-color: #888;
            border-radius: 10px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background-color: #555;
        }

        .modal-body::-webkit-scrollbar-track {
            background: #f1f1f1;
        }


  </style>


<div class="modal fade bd-example-modal-lg" id="modal_acessorios_eletroduto" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">

    <div class="modal-content">
      <div class="modal-header">
        <!--<h5 class="modal-title" id="exampleModalLabel">Configurar informações de materiais</h5>-->
        <h5 class="modal-title" id="exampleModalLabel">CONFIGURAR ACESSÓRIOS DE ELETRODUTO</h5>
        <!--<button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>-->
      </div>
      <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">


        <div class="row align-items-center" style="margin-top: 25px;">
            <!-- Tipo de Condulete e Porcentagem (empilhados) -->
            <div class="col-4">
                <div class="form-group input-group-sm mb-3">
                    <label>Tipo Acessório</label>
                    <div>
                        <select class="form-control" style="width: 200px; height: 38px"  id="tipo_acessorio" onchange="SelecionarEspecificacao()">
                            <option id="--" selected>---</option>
                            <option onclick="CarregaDadosCondulete()">CONDULETE</option>
                            <option onclick="CarregaDadosLuva()">LUVA</option>
                        </select>
                    </div>
                </div>
                <div class="form-group input-group-sm mb-3">
                    <label>Especificação</label>
                    <div>
                        <select class="form-control" id="especificacao_acessorio" style="width: 200px; height: 38px">
                            <option id="--" selected>---</option>
                        </select>
                    </div>
                </div>
                <div class="form-group input-group-sm">
                    <label>Porcentagem:</label>
                    <input type="text" class="form-control" id="porcentagem_acessorio" maxlength="8" style="width: 200px; height: 38px">
                </div>
                <div class="form-group input-group-sm mb-3">
                    <label>Tipo de Rosca</label>
                    <div>
                        <select class="form-control" style="width: 200px; height: 38px"  id="tipo_rosca_acessorio_eletr">
                            <option id="--" selected>---</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Botão -->
            <div class="col-2 text-center">
                <button type="button" class="btn btn-outline-primary rounded-pill" onclick="SalvaAcessorioEletroduto()"> ➔ </button>
            </div>

            <!-- Tipicos Selecionados -->
            <div class="col-4">
                <div class="border p-3 overflow_chrome overflow_firefox" id="acessorios_eletrodutos_cadastrados" style="height: 300px;">


                </div>
            </div>
        </div>







      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success" onclick="GerarMateriaisEletrodutos()">Gerar DWG</button>
        <button type="button" class="btn btn-danger" data-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>



<script src="{% static 'js/eletrica/A1Pro/ConfigMatFC.js' %}"></script>
