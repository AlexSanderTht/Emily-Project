{% load static %}
    <div class="container-fluid " id="template_tipicos_band_eletro" hidden>
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 row ">
             <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6 h-90 border-right ">
                <div class="col-xs-12 col-sm-12  col-md-12 col-lg-12 text-center">
                    <h5>Insira a Bandeja/Eletrocalha</h5>
                </div>
                <div class="card_dropzone_blue animate__animated animate__fadeIn mt-1 h-50 px-3 scroll_templates_gt" id="cardzone_block_header_band_eletro">
                    <div class="text-center dwgs_insert">
                        <!---------------- Inicio Message ------------------>
                        <div class="d-flex flex-column">
                            <span class="font-italic text-primary">Arraste e solte o arquivo dwg de <b>Bandeja/Eletrocalha</b></span>
                            <span class="font-italic text-primary">click em import para fazer o upload.</span>
                        </div>
                        <!---------------- Fim Message ------------------>
                        <label class="mt-2 btn btn-primary rounded-pill text-white">
                            <input accept=".dwg" class="hidden" type="file" id="arquivo_dwg_header_bandeja" onchange="DropArquivoGerenciarTipicosBandEletro()"/>
                            Upload
                        </label>
                    </div>
                    <div id="cardzone_block_band_eletro"></div>
                    <div class="container-fluid bg-primary radius_10 text-white animate__animated animate__zoomInDown p-3 " id="band_ele_forms_file" hidden>
                        <div class="row mt-2">
                            <div class="col ">
                                <label>Nome do Bloco:</label>
                            </div>
                            <div class="col">
                                <input id="nome_bloco_band_eletro" class="form-control form-control-sm" type="text">
                            </div>
                        </div>
                        <div class="row my-2 border-top border-bottom">
                            <div class="col d-flex align-items-center">
                                <label>Dimenções:</label>
                            </div>
                            <div class="col my-1">
                                <label for="altura_bandeja" >Altura da Bandeja/Eletrocalha</label>
                                <input type="text" class="form-control" id="altura_bandeja" placeholder="Altura da Bandeja">

                                <label for="largura_bandeja">Largura da Bandeja/Eletrocalha</label>
                                <input type="text" class="form-control" id="largura_bandeja" placeholder="Largura da Bandeja">
                            </div>
                        </div>

                        <div class="row mt-1">
                            <div class="col d-flex align-items-center">
                                <label>Tipo:</label>
                            </div>
                            <div class="col">
                                <select id="bandeja_eletrocalha" class="form-control form-control-sm">
                                  <option>BANDEJA</option>
                                  <option>ELETROCALHA</option>
                                </select>
                            </div>
                        </div>
                        <div class="row my-2 border-top border-bottom">
                            <div class="col d-flex align-items-center">
                                <label>Ponto de Inicio do Bloco:</label>
                            </div>
                            <div class="col my-1">
                                <label for="pos_inicial">Posição X</label>
                                <input type="text" class="form-control" id="pos_inicial" placeholder="Posição em X">
                                <label for="pos_final">Posição Y</label>
                                <input type="text" class="form-control" id="pos_final" placeholder="Posição em Y">
                            </div>
                        </div>
                        <div class="row mt-1">
                            <div class="col d-flex align-items-center">
                                <label>Primeiro Bloco?:</label>
                            </div>
                            <div class="col">
                                <select id="primeiro_bloco" class="form-control form-control-sm">
                                  <option>SIM</option>
                                  <option>NÃO</option>
                                </select>
                            </div>
                        </div>
                        <div class="row my-2 border-top">
                            <div class="col d-flex align-items-center">
                                <label>Ponto de Inserção do primeiro Bloco:</label>
                            </div>
                            <div class="col my-1">
                                <label for="pos_inicial_primeiro">Posição X</label>
                                <input type="text" class="form-control" id="pos_inicial_primeiro" placeholder="Posição em X">
                                <label for="pos_final_primeiro">Posição Y</label>
                                <input type="text" class="form-control" id="pos_final_primeiro" placeholder="Posição em Y">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 my-2 d-flex justify-content-end border-bottom py-2">
                    <button onclick="ClickButtonLimparBandEle()" class="btn btn-outline-secondary me-md-2">Limpar</button>
                     <button onclick="SendInfoFileBlock()" class="btn btn-outline-primary">Salvar</button>
                     <input class="form-control form-control-sm" type="text" hidden id="band_ele_exists_selected">
                </div>

                <div class="row my-2">
                    <div class="col-auto">
                        <div class="input-group">
                            <div class="search-box border border-secondary-subtle d-flex justify-content-end float-end">
                               <input type="search"  class="search-text" id="TextFix" placeholder="Pesquisar..." onkeyup="FilterTipicosProject(this.value)" >
                               <a id="search-button" class="search-btn" >
                                 <img class="loupe-white" src="{% static 'scripts/search_FILL0_wght400_GRAD0_opsz48.svg' %}" >
                               </a>
                            </div>
                        </div>
                    </div>

                    <div class="col-auto d-inline-flex align-items-end">
                        <div class="form-check">
                          <input class="form-check-input border-primary" type="checkbox" id="selectAllTemplates" onchange="changeCheckboxSelectAllChecks(this.checked, 'check_in_band_ele_exists')">
                          <label class="form-check-label" for="selectAllTemplates">
                            Selecionar todos
                          </label>
                        </div>
                    </div>

                    <div class="col-auto d-inline-flex align-items-end">
                        <button type="button" class="btn btn-danger" onclick="deleteAllBandEleSelecteds()">Remover Selecionados</button>
                    </div>
                </div>
                <div class="col">

                    <div class="row px-2 overflow-y-auto py-2" style="height: 200px;">
                        <div class="col-12">
                            <div class="row" >
                               {% for id_band, name_band, name_reduce in BandEletr %}
                                    <div class="col-6 name_filter_BandEletr px-4"  title="{{name_band}}">
                                        <div class="row p-2 border rounded-4 my-2 bg-secondary">
                                            <div class="col-8">
                                                <div class="bg-white rounded-4 border p-2 d-inline-flex w-100 muda_cursor_hover" onclick="ShowDwgInScreenBandEletr('{{id_band}}');GetInfoBlockEletBand('{{id_band}}')">
                                                    <img  src="{% static 'img/DWG.png' %}" alt="Image TXT" width="30">
                                                    <div class="ms-2">
                                                        <span type="text" class="mb-0">{{name_band}}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-4">
                                                <div class="rounded-4 bg-white border p-2 w-100 d-inline-flex justify-content-between align-items-center">
                                                    <button title="Remover arquivo" class="btn btn-outline-danger rounded-pill border-0" type="button">
                                                         <i class="fas fa-times-circle fa-xl" onclick="DeleteFileDwgBandEletr(['{{id_band}}'])"></i>
                                                    </button>

                                                    <div class="form-check">
                                                      <input class="form-check-input border border-primary check_in_band_ele_exists" value="{{id_band}}" id="checkbox_select_band_ele_{{id_band}}" type="checkbox">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                               {% endfor %}
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-2 float-right p-2  mt-3">

                    </div>
                </div>
             </div>

            <div class="col-xs-6 col-sm-6  col-md-6 col-lg-6">
                <div class="col-xs-12 col-sm-12  col-md-12 col-lg-12 text-center mt-2">
                    <h5>Visualização da Bandeja/Eletrocalha</h5>
                </div>
                <div class="container-fluid ">
                    <img src="" id="img_dwg_band_ele" class="shadow">
                </div>
            </div>
        </div>
    </div>

<script src="{% static 'js/eletrica/A1Pro/GerenciarTipicosBandEletro.js' %}"></script>
<script>
    var FilesBandEele = new FormData()
    function DropArquivoGerenciarTipicosBandEletro(arquivo=null){
        let drop_container = document.getElementById('cardzone_block_band_eletro');
        let file = document.getElementById('arquivo_dwg_header_bandeja');
        let form;
        let name_file;
        let name_title;
        let drop = '';
        let band_ele_selected = document.getElementById('band_ele_exists_selected').value


        form = arquivo === null?file.files[0]:arquivo.files[0]
        ClearFilesBandEleDropzoneGt()
        FilesBandEele.append('FileBandEle', form)
        //ClearDropzonesInsert(id_drop)
        name_file = form.name
        name_title = name_file
        let name_split = name_file.split('.');
        let extension = name_split[name_split.length -1]
        if(extension === 'dwg'){
            drop = `<div class="col-12 mx-auto my-1 input-group rounded-pill border input-group-sm bg-white shadow px-1 animate__animated animate__zoomInDown" title="${name_title}">
                        <div class="input-group-prepend my-auto px-1">
                            <img  src="{% static 'img/DWG.png' %}" alt="Image DWG" width="30">
                        </div>
                        <span type="text" title="${name_title}" class="col border-0 input-group-text bg-white text-truncate">${name_file}</span>
                        <div class="input-group-append">
                            <button class="btn btn-outline-danger rounded-pill px-2 my-1 border-0" type="button">
                                <i class="fas fa-times-circle fa-lg" onclick="DeleteFileDwg(this, 'arquivo_dwg_header_bandeja')"></i>
                            </button>
                        </div>
                    </div>`
            drop_container.innerHTML = drop;
            if(band_ele_selected === ''){
                document.getElementById('band_ele_forms_file').hidden = false
                ClearFormsFileBandEle()
            }
        }
        else{
            document.getElementById('band_ele_forms_file').hidden = true
            return swal({
                        title: "Atenção!",
                        text: 'Só é aceito arquivos DWG!!',
                        icon: "warning",
                        button: "Fechar",
            })
        }

    }
    //--------------------- Filtro de pesquisa ------------------//

   function FilterTipicosProject(){
        let input = document.getElementById('TextFix').value
        input = input.toLowerCase();
        let filt_BandEletr = document.getElementsByClassName('name_filter_BandEletr');

        for (i = 0; i < filt_BandEletr.length; i++) {
            if(!filt_BandEletr[i].title.toLowerCase().includes(input)){
            filt_BandEletr[i].style.display = "none";
            }else{
                filt_BandEletr[i].style.display= ""
            }
        }
   }
   //-----------Limpar input pesquisa ------------//
    window.onload = function (){
       document.getElementById('TextFix').value = '';
    }

</script>
