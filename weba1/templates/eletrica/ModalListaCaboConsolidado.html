{% load static %}
{% csrf_token %}

<div class="modal fade" id="modal_lista_cabos_consolidado" data-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" >
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Listas de Cabos Consolidadas</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="d-flex justify-content-center">
                <select id="select_rev_lista_cabos" class="form-control col-6">
                    <option selected value="0">---</option>
                </select>
            </div>
            <div class="modal-footer">
                <div class="d-flex">
                    <button type="button" class="btn btn-success" onclick="donwload_zip_consolidado()">
                        <i class="fa-solid fa-download pr-2"></i>Download
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
    function donwload_zip_consolidado(){
        let rev_lista_cabos = document.getElementById('select_rev_lista_cabos').selectedOptions[0].value
        if (rev_lista_cabos === '0'){
            alert('Selecione uma revisão Válida')
        }else{
            window.open(`/app/eletrica/lista_cabos_consolidado/${rev_lista_cabos}`, '_self')
        }

    }

</script>
