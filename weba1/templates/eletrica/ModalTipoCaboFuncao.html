{% load static %}
{% csrf_token %}
<div class="modal fade" id="modal_tipo_cabo_func" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tipo Cabo Função</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-6">
                <div class="form-group">
                  <label class="col-form-label">Nome:</label>
                  <input type="text" class="form-control form-control input-a1style" id="nome_tipo_cabo">
                </div>
                <div class="form-group">
                  <label class="col-form-label">Sigla:</label>
                  <input type="text" class="form-control form-control input-a1style" id="sigla_tipo_cabo">
                </div>
              </div>
              <div class="col-6">
                <div class="form-group">
                  <label class="col-form-label">Procurar:</label>
                  <input type="text" class="form-control input-a1style" id="search_tipo_cabo" onkeyup="FilterTipoCabo(this.value)">
                </div>

                <div class="form-group">
                  <select multiple class="form-control input-a1style pe-auto" id="all_tipo_cabo"></select>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-success" onclick="SendDatasTipoCaboFunc()">Salvar</button>
            <button type="button" class="btn btn-warning" onclick="ClearTipoCabo()">Limpar</button>
            <button type="button" class="btn btn-danger" onclick="DeleteTipoCabo()">Excluir</button>
<!--            <button type="button" class="btn btn-warning" data-dismiss="modal">Fechar</button>-->
          </div>
    </div>
  </div>
</div>
<script src="{% static 'js/eletrica/A1Pro/TipoCaboFuncao.js' %}"></script>
