{% load static %}
<div class="modal fade " id="modal_areas_ct" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content mt-5 shadow border estl_modal" id="testarea">
      <div class="modal-header border-0">
        <h5 class="modal-title font-weight-bold mt-2 p-1" id="exampleModalLabel">Áreas</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body ">
        <div class="row">
          <div class="col-6">
            <div class="col-12 p-0">
              <label class="col-form-label">Nome:</label>
              <input type="text" class="form-control input-a1style" id="nome_areas_gt" >
            </div>
            <div class="col-12 p-0 mt-1">
              <label class="col-form-label">Descrição:</label>
              <input type="text" class="form-control input-a1style" id="desc_areas_gt">
            </div>
          </div>
          <div class="col-6">
            <div class="col-12 p-0">
              <label class="col-form-label ">Procurar:</label>
              <input type="text" class="form-control input-a1style " id="search_areas_gt" onkeyup="FilterSelectsCt(this.value, 'all_areas_gt')">
            </div>
            <div class="col-12 p-0 mt-2">
              <select multiple class="form-control input-a1style pe-auto" id="all_areas_gt"></select>
            </div>
            <input type="text" class="form-control input-a1style" id="selected_areas_gt" hidden>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="grid d-flex align-self-start mr-auto">
          <button type="button" class="btn btn-success" onclick="SendDatasAreas()" style="">Adicionar/Alterar</button>
        </div>
        <button type="button" class="btn btn-warning"  onclick="ClearFieldsAreas()">Limpar</button>
        <button type="button" class="btn btn-danger"  onclick="DeleteAreas()">Excluir</button>
      </div>
    </div>
  </div>
</div>
