{% load static %}
<div class="modal fade bd-example-modal-lg" id="modal_tala_simples" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="tala_selected">SIMPLES</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
          <div class="row">
              <div class="col-5 border-right">
                  <div class="col-12 radius_10 bg-secondary text-white text-center mx-2">
                      Gerenciar Materiais
                  </div>
                  <div class="row mx-2 mt-1">
                      <label>Filtro:</label>
                      <input class="form-control" type="text" id="tala_simples_adc_filter">
                  </div>

                  <div class="row mx-2">
                      <label>Quantidade Talas:</label>
                      <input class="form-control" type="number" id="tala_simples_adc_quant">
                  </div>

                  <div class="row mt-2 mx-2">
                      <button type="button" class="btn btn-warning" onclick="AdcFilterGerenciarMatTalaSimples()"><i class="fa-solid fa-plus"></i></button>
                  </div>

                  <div class="row mt-1 d-flex justify-content-center">
                      Filtros adicionados:
                  </div>
                  <div class="container-fluid radius_10 border gerenciar_mats_tala_simples" id="tala_simples_all_filters_adc">

                  </div>
              </div>


              <div class="col-7">
                  <div class="row radius_10 bg-secondary text-white text-center mx-2">
                      <div class="col-10">
                          Materiais adicionais:
                      </div>

                      <div class="col-2">
                          <i class="fa-solid fa-plus hover_btn_mais_lst_mat_mats_adc" onclick="ClickBtnAdcMatAdc('tala_simples_content_adc_mats_adc')"></i>
                      </div>
                  </div>

                  <div class="row border radius_10 my-2 mx-2" id="tala_simples_content_adc_mats_adc" hidden>
                      <div class="col-6 mb-2">
                          <label>
                              Código
                          </label>
                          <input class="form-control" type="text" id="tala_simples_code_new_mat_adc">

                      </div>
                      <div class="col-4 mb-2">
                          <label>
                              Quantidade
                          </label>
                          <input class="form-control" type="number" id="tala_simples_quant_new_mat_adc">
                      </div>
                      <div class="col-2 d-flex align-items-end mb-2">
                          <button type="button" class="btn btn-warning" onclick="AddMatAdcTalaListMat('tala_simples_code_new_mat_adc', 'tala_simples_quant_new_mat_adc', 'tala_simples_content_all_mats_adc')"><i class="fa-solid fa-plus"></i></button>
                      </div>
                  </div>
                  <div class="row">
                      <div class="col-9 text-center">
                          Code
                      </div>

                      <div class="col-3 text-center">
                          Quant
                      </div>
                  </div>

                  <div class="container-fluid bg-secondary text-white radius_10" id="tala_simples_content_all_mats_adc">

                  </div>
              </div>
          </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning" onclick="SendDatasTalaSimples()">Salvar</button>
        <button type="button" class="btn btn-warning" data-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
