{% load static %}

<div class="modal fade" id="modal_grupos_gt" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content mt-5 shadow border estl_modal">
      <div class="modal-header border-0 ">
        <h5 class="modal-title font-weight-bold mt-2 p-1" id="exampleModalLabel">Grupos</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body ">
        <div class="row">
          <div class="col-6">
            <div class="form-group">
              <label class="col-form-label">Nome:</label>
              <input type="text" class="form-control form-control input-a1style" id="nome_grupo_gt">
            </div>

            <div class="form-group">
              <label class="col-form-label">Tipo do Grupo:</label>
              <select class="form-control form-control input-a1style" id="tipo_grupo_gt">
                <option value="0">---</option>
                <option value="NORMAL">MULTIPLICADOR</option>
<!--                <option value="FIXACAO">FIXAÇÃO</option>-->
                <option value="NIVEIS">NÍVEIS</option>
                <option value="UNITARIO">UNITÁRIO</option>
<!--                <option value="TALAS">TALAS</option>-->
              </select>

            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label class="col-form-label">Procurar:</label>
              <input type="text" class="form-control input-a1style" id="search_grupo_gt" onkeyup="FilterSelectsCt(this.value, 'all_grupos_gt')">
            </div>

            <div class="form-group">
              <select multiple class="form-control input-a1style pe-auto" id="all_grupos_gt"></select>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="grid d-flex align-self-start mr-auto">
          <button type="button" class="btn btn-success" onclick="SendValuesGrupos()" style="">Adicionar/Alterar</button>
        </div>
        <button type="button" class="btn btn-warning"  onclick="ClearGrupos()">Limpar</button>
        <button type="button" class="btn btn-danger"  onclick="DeleteGrupo()">Excluir</button>
      </div>
    </div>
  </div>
</div>
