{% load static %}
{% block modal_warning %}

<div class="modal modal-sm mx-auto" tabindex="-1" role="dialog" id="modal-warning-a1pro">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="header-modal_warning-a1pro"></h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p id="content-modal_warning-a1pro"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btn_hide_modal_warning" onclick="$('#modal-warning-a1pro').modal('hide');" aria-hidden="true">Fechar</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}
