<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabulator Example</title>
    <link href="https://unpkg.com/tabulator-tables@5.2.7/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.2.7/dist/js/tabulator.min.js"></script>
</head>
<body>
    <div id="example-table"></div>

    <script>
        // Dados da tabela
        var tabledata = [
            {material: "ARRUELA LISA - 3/8\"", area_normal: "MARL0AN000H", area_corrosiva: "MARL0ACBI0H"},
            {material: "PORCA SEXTAVADA - 3/8\"", area_normal: "MPOWS00S00H", area_corrosiva: "MPOWS00C0BH"},
            {material: "GRAPA PARA LEITO C/ FURO DE 10MM", area_normal: "JLGRMPAI631", area_corrosiva: "JLGRMPAI631"},
            // Adicione mais dados conforme necessário
        ];

        // Inicialize a tabela
        var table = new Tabulator("#example-table", {
            data: tabledata,
            layout: "fitColumns",
            columns: [
                {title: "Materiais", field: "material"},
                {title: "ÁREA NORMAL", field: "area_normal"},
                {title: "ÁREA CORROSIVA", field: "area_corrosiva"},
            ],
        });
    </script>
</body>
</html>
