{% load static %}
{% block modal_gerenc_gest_a1procontrol %}

<div class="modal mx-auto" tabindex="-1" role="dialog" id="modal-gerenc-gest-a1procontrol">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Gerenciamento de Gestores de disciplina</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-lg-6">
              <label for="all-persons-geren-gest">Todas Pessoas:</label>
              <input type="text" class="form-control" onkeyup="filter_persons_a1pro_control('all-persons-geren-gest', this.value)">
              <select class="form-control mt-2" id="all-persons-geren-gest" multiple>
              </select>
          </div>

          <div class="col-lg-6">
              <label for="gerents-a1pro">Gerentes:</label>
              <input type="text" class="form-control" onkeyup="filter_persons_a1pro_control('gerents-a1pro', this.value)">
              <select class="form-control mt-2" id="gerents-a1pro" multiple ondragover="changecolor_gerents(event, 'gray', this.id)" ondrop="drop_person_for_gerent(event)" ondragleave="changecolor_gerents(event, 'white', this.id)">
              </select>
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-lg-12 text-right">
            <button type="button" class="btn btn-secondary" id="btn_thrash_gerents" ondragover="changecolor_gerents(event, 'white', this.id)" ondrop="drop_gerent_for_trash(event)" ondragleave="changecolor_gerents(event, 'gray', this.id)">🗑️</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="$('#modal-gerenc-gest-a1procontrol').modal('hide')">Fechar</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}
