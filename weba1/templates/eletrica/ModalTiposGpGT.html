{% load static %}
<div class="modal fade" id="modal_tipos_gp_gt" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" data-backdrop="static" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content mt-5 shadow border estl_modal border-0">
      <div class="modal-header border-0">
        <h5 class="modal-title font-weight-bold mt-2 p-1" id="exampleModalLabel">Tipos Grupos</h5>

        <button type="button" class="close" data-dismiss="modal" aria-label="Close" onclick="$('#modal_tipos_gp_gt').modal('hide');window.location.reload()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
          <div class="row">
            <div class="col-1">
              Normal
            </div>
            <div class="col-8 ml-3">
              <div class="d-flex align-items-center">
                <label class="switch_toggle mb-0 mt-1">
                    <input type="checkbox" id="checkbox_tipo_gp">
                    <span class="slider_switch round"></span>
                </label>
                <p class="ml-2 mb-0">Eletrocalha/Bandeja</p>
              </div>
            </div>

          </div>
      </div>
      <div class="modal-footer ">
        <button type="button" class="btn btn-danger shadow efeitbotl" onclick="$('#modal_tipos_gp_gt').modal('hide');window.location.reload()">Fechar</button>
        <button type="button" class="btn btn-success shadow efeitbote" onclick="WhatModalGp()">Selecionar</button>
      </div>
    </div>
  </div>
</div>
