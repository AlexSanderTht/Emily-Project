{% load static %}
{% block crit_tag_sinal %}
<div class="container" id="crit-tag-sinal">
    <div class="container mx-2 border-bottom border-right border-left">
        <div class="row ml-1">
            <h6><b>TAG do Cabo</b></h6>
        </div>
        <div class="row ml-1">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="checkbox-tag-sinal" id="crit-tag-sinal-carga-checkbox" value="CARGA">
              <label class="form-check-label" for="crit-tag-sinal-carga-checkbox">TAG - Carga</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="checkbox-tag-sinal" id="crit-tag-sinal-alimentador-checkbox" value="ALIMENTADOR">
              <label class="form-check-label" for="crit-tag-sinal-alimentador-checkbox">TAG - Alimentador</label>
            </div>
        </div>
        <div class="row ml-1 mt-2">
            <b>SINAL</b>
        </div>
        <div class="row mt-1 mb-3">
            <div class="col-lg-7">
                <select class="form-select w-100 h-100" multiple aria-label="multiple select example" id="select-sinal-crit-tag">
                </select>
            </div>

            <div class="col-lg-5">
                <label for="crit-tag-sinal-first-carac">1° Caractere</label>
                <input type="text" required class="form-control w-75 mb-1" id="crit-tag-sinal-first-carac" onkeyup="VerifyFormsSizeOne(this.id)">
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '2', df_tipo_cabo_sinal)">2° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '3', df_tipo_cabo_sinal)">3° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '4', df_tipo_cabo_sinal)">4° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '5', df_tipo_cabo_sinal)">5° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '6', df_tipo_cabo_sinal)">6° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '7', df_tipo_cabo_sinal)">7° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-1" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '8', df_tipo_cabo_sinal)">8° Caractere</button>
                <button type="button" class="btn btn-warning w-75 mb-3" onclick="VerifySinalOrAcessForShowModal(df_tipo_cabo_sinal, '9', df_tipo_cabo_sinal)">9° Caractere</button>
            </div>
        </div>
    </div>

    <div class="row mx-1 mt-2">
        <div class="col-lg-12 justify-content-end text-right">
            <button type="button" class="btn btn-primary" onclick="SendFTagBack('SINAL')">Atualizar</button>
            <button type="button" class="btn btn-dark" onclick="HideModalFTag()">Fechar</button>
        </div>
    </div>
</div>
{% endblock %}
