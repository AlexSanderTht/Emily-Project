{% load static %}
{% block crit_tag_neutro %}
<div class="container" id="crit-tag-neutro">
    <div class="row mx-2">
        <div class="col border-left border-right border-bottom ml-1 mr-2">
            <h6><b>TAG do Cabo</b></h6>
            <div class="form-check ml-1">
                <input class="form-check-input" type="checkbox" name="checkbox-tag-neutro" value="CARGA" id="crit-tag-neutro-carga-checkbox" onclick="check_only_1_element('crit-tag-neutro-carga-checkbox', 'checkbox-tag-neutro')">
                <label class="form-check-label" for="crit-tag-neutro-carga-checkbox">
                  TAG - Carga
                </label>
            </div>
            <br>
            <div class="form-check ml-1">
                <input class="form-check-input" type="checkbox" name="checkbox-tag-neutro" value="ALIMENTADOR" id="crit-tag-neutro-alimentador-checkbox" onclick="check_only_1_element('crit-tag-neutro-alimentador-checkbox', 'checkbox-tag-neutro')">
                <label class="form-check-label" for="crit-tag-neutro-alimentador-checkbox">
                  TAG - Alimentador
                </label>
            </div>
            <br>
        </div>

        <div class="col-sm-5 border-bottom border-left border-right">
            <h6 class="text-center w-100"><b>1° Caractere</b></h6>
            <input type="text" class="form-control mb-2" id="crit-tag-neutro-first-carac" onkeyup="VerifyFormsSizeOne(this.id)">
        </div>
    </div>

    <br>

    <div class="row mx-2">
        <div class="col border-left border-right border-bottom justify-content-center text-center">
            <h6 class="text-center w-100"><b>NEUTRO</b></h6>
            <br>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '2', df_tipo_cabo_neutro)">2° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '3', df_tipo_cabo_neutro)">3° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '4', df_tipo_cabo_neutro)">4° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '5', df_tipo_cabo_neutro)">5° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '6', df_tipo_cabo_neutro)">6° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '7', df_tipo_cabo_neutro)">7° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '8', df_tipo_cabo_neutro)">8° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-3" onclick="ShowAndFillModalCaracteres(df_tipo_cabo_neutro, '9', df_tipo_cabo_neutro)">9° Caractere</button>
        </div>
    </div>

    <div class="row mx-1 mt-2">
        <div class="col-lg-12 justify-content-end text-right">
            <button type="button" class="btn btn-primary" onclick="SendFTagBack(df_tipo_cabo_neutro)">Atualizar</button>
            <button type="button" class="btn btn-dark" onclick="HideModalFTag()">Fechar</button>
        </div>
    </div>
</div>
{% endblock %}
