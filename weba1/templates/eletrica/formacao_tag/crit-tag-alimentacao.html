{% load static %}
{% block crit_tag_alimentacao %}
<div class="container" id="crit-tag-alimentacao">
    <div class="row mx-2">
        <div class="col border-left border-right border-bottom ml-1 mr-2">
            <h6><b>TAG do Cabo</b></h6>
            <div class="form-check ml-1">
                <input class="form-check-input" type="checkbox" value="CARGA" name="checkbox-tag-ali" id="crit-tag-ali-carga-checkbox" onclick="check_only_1_element('crit-tag-ali-carga-checkbox', 'checkbox-tag-ali')">
                <label class="form-check-label" for="crit-tag-ali-carga-checkbox">
                  TAG - Carga
                </label>
            </div>
            <br>
            <div class="form-check ml-1">
                <input class="form-check-input" type="checkbox" value="ALIMENTADOR" name="checkbox-tag-ali" id="crit-tag-ali-alimentador-checkbox" onclick="check_only_1_element('crit-tag-ali-alimentador-checkbox', 'checkbox-tag-ali')">
                <label class="form-check-label" for="crit-tag-ali-alimentador-checkbox">
                  TAG - Alimentador
                </label>
            </div>
            <br>
        </div>

        <div class="col-sm-5 border-bottom border-left border-right">
            <h6 class="text-center w-100"><b>1° Caractere</b></h6>
            <input type="text" class="form-control mb-2" id="crit-tag-ali-first-carac">
        </div>
    </div>

    <br>

    <div class="row mx-2">
        <div class="col border-left border-right border-bottom justify-content-center text-center">
            <h6 class="text-center w-100"><b>UNIPOLAR</b></h6>
            <br>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '2', df_tipo_cabo_ali)">2° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '3', df_tipo_cabo_ali)">3° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '4', df_tipo_cabo_ali)">4° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '5', df_tipo_cabo_ali)">5° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '6', df_tipo_cabo_ali)">6° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '7', df_tipo_cabo_ali)">7° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '8', df_tipo_cabo_ali)">8° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-3" onclick="ShowAndFillModalCaracteres('UNIPOLAR', '9', df_tipo_cabo_ali)">9° Caractere</button>
        </div>

        <div class="col border-left border-right border-bottom justify-content-center text-center">
            <h6 class="text-center w-100"><b>MULTIPOLAR</b></h6>
            <br>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '2', df_tipo_cabo_ali, true)">2° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '3', df_tipo_cabo_ali, true)">3° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '4', df_tipo_cabo_ali, true)">4° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '5', df_tipo_cabo_ali, true)">5° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '6', df_tipo_cabo_ali, true)">6° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '7', df_tipo_cabo_ali, true)">7° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-1" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '8', df_tipo_cabo_ali, true)">8° Caractere</button>
            <button type="button" class="btn btn-warning w-75 mb-3" onclick="ShowAndFillModalCaracteres('MULTIPOLAR', '9', df_tipo_cabo_ali, true)">9° Caractere</button>
        </div>
    </div>

    <div class="row mx-1 mt-2">
        <div class="col-lg-12 justify-content-end text-right">
            <button type="button" class="btn btn-primary" onclick="SendFTagBack('ALIMENTAÇÃO')">Atualizar</button>
            <button type="button" class="btn btn-dark" onclick="HideModalFTag()">Fechar</button>
        </div>
    </div>
</div>
{% endblock %}
