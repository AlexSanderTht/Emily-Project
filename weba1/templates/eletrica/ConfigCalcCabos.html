{% load static %}
{% block config_calc_cabos %}
<div class="modal fade bd-example-modal-lg" id="config-calc-cabos" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true" data-backdrop="static">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Configuração para Cálculo de Cabos</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row d-flex justify-content-center">
          <div class="col-lg-1 d-flex align-items-center">
            <label for="func-config-cc">Função:</label>
          </div>

          <div class="col-lg-6">
            <select class="form-control" id="func-config-cc" onchange="ChangeFuncFillTensao(this.selectedOptions[df_index_first_element_array]);SendFuncForVerifyNivelTensao();">
            </select>
          </div>

          <div class="col-lg-2">
            <input type="text" required class="form-control" id="tensao-func-config-cc" placeholder="Tensão" readonly>
          </div>

        </div>

        <div class="row d-flex justify-content-center mt-1">
          <div class="col-4">
            <input type="checkbox" style="display: none;" class="form-check-input" id="all_func_config_cc">
            <!-- <label class="form-check-label" for="all_func_config_cc">Atribuir em todas as funções</label> -->
          </div>
        </div>

        <input type="text" id="nivel_tensao_func_config_cc" hidden>

        <div class="container" id="content_bt_or_mt">

        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success" onclick="ExecFuncSend()">Salvar</button>
        <button type="button" class="btn btn-dark" data-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/calc_cabos/a1calccabosjs.js' %}"></script>
<script src="{% static 'js/eletrica/ConfigCalcCabos.js' %}"></script>
{% endblock %}
