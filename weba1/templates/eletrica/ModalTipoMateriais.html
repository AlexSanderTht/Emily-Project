{% load static %}
<div class="modal fade" id="modal_tipo_material" tabindex="-1" role="dialog" data-backdrop="static" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="tala_selected">Tipos Materiais</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close" onclick="FillSelectTiposMatTelaPrincialLstMat()">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
              <div class="row">
                  <div class="col-7 border-right">
                      <div class="row mx-2 mt-1">
                          <label>Nome:</label>
                          <input class="form-control" type="text" id="nome_tipo_material">
                      </div>

                      <div class="row mx-2">
                          <label>Descriçao:</label>
                          <input class="form-control" type="text" id="desc_tipo_material">
                      </div>

                  </div>

                  <div class="col-5">
                      <div class="col-12 mt-1">
                          <label>Pesquisar:</label>
                          <input class="form-control" type="text" id="search_tipo_material" onkeyup="FilterOptionsTipoMatInSelect(this.value)">
                      </div>

                      <div class="col-12 mt-2">
                          <select multiple class="form-control" id="all_tipo_materiais">
                          </select>
                      </div>
                  </div>
              </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-warning" onclick="SendDatasTiposMatLstMat()">Adicionar/Alterar</button>
            <button type="button" class="btn btn-warning" onclick="DeleteTipoMatLstMat()">Remover</button>
            <button type="button" class="btn btn-warning" onclick="ClearFormsTipoMatLstMat()">Limpar</button>
            <button type="button" class="btn btn-warning" data-dismiss="modal" onclick="FillSelectTiposMatTelaPrincialLstMat()">Fechar</button>
          </div>
    </div>
  </div>
</div>
