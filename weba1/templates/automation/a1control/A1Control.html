{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A1 Control</title>
  <link href="{% static 'vendor/bootstrap-4.1/bootstrap.min.css' %}" rel="stylesheet" media="all" />
  <link rel="stylesheet" href="{% static 'font_awesome_6_1/css/all.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <style>
    :root {
      --accent:       #f3b768;
      --accent-hover: #f6c783;
      --accent-dark:  #c8862a;
      --glass-bg:     linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.10) 100%);
      --glass-border: rgba(255,255,255,.32);
      --glass-radius: 22px;
      --text-invert:  #ffffff;
    }

    /* ── Body override (login.css centra; aqui precisa scroll) ── */
    body {
      align-items: flex-start !important;
      justify-content: center !important;
      padding: 48px 28px 28px !important;
      overflow: auto;
      min-height: 100vh;
    }
    body::before {
      filter: blur(16px) brightness(0.30) saturate(0.58) !important;
    }

    /* ── OVERLAY DE ENTRADA ── */
    #page-enter-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0d0d0d;
      opacity: 1;
      pointer-events: none;
      transition: opacity .55s cubic-bezier(.4,0,.2,1);
    }
    #page-enter-overlay.done { opacity: 0; }

    /* ── PAINEL PRINCIPAL ── */
    .a1control-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--glass-radius);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      box-shadow: 0 24px 72px -18px rgba(0,0,0,.60), 0 6px 24px -6px rgba(0,0,0,.35);
      padding: 28px 30px;
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      color: var(--text-invert);
    }

    /* ── TOPBAR ── */
    .a1control-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,.15);
    }
    .a1control-topbar .app-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .02em;
    }
    .a1control-topbar .app-subtitle {
      font-size: .82rem;
      color: rgba(255,255,255,.60);
      margin: 0;
    }
    .btn-voltar {
      margin-left: auto;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.22);
      color: var(--text-invert);
      border-radius: 10px;
      padding: 6px 16px;
      font-size: .82rem;
      text-decoration: none;
      transition: background .2s;
    }
    .btn-voltar:hover {
      background: rgba(255,255,255,.20);
      color: var(--text-invert);
      text-decoration: none;
    }

    /* ── CONTEÚDO ── */
    .a1control-body {
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    /* ── BOTÕES DE MÓDULO ── */
    .btn-module {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 260px;
      height: 200px;
      background: linear-gradient(145deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-invert);
      text-decoration: none;
      box-shadow: 0 8px 32px -8px rgba(0,0,0,.45);
      transition: transform .22s cubic-bezier(.2,.9,.2,1),
                  box-shadow .22s ease,
                  background .22s ease,
                  border-color .22s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .btn-module::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 60%);
      pointer-events: none;
      border-radius: 20px;
    }
    .btn-module:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 20px 48px -10px rgba(0,0,0,.55);
      border-color: var(--accent);
      background: linear-gradient(145deg, rgba(243,183,104,0.18) 0%, rgba(243,183,104,0.07) 100%);
      color: var(--text-invert);
      text-decoration: none;
    }
    .btn-module:active {
      transform: translateY(-2px) scale(1.01);
    }
    .btn-module .module-icon {
      font-size: 2.4rem;
      color: var(--accent);
      transition: transform .22s ease;
    }
    .btn-module:hover .module-icon {
      transform: scale(1.12);
    }
    .btn-module .module-label {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-align: center;
      line-height: 1.3;
    }
    .btn-module .module-sublabel {
      font-size: .75rem;
      color: rgba(255,255,255,.50);
      text-align: center;
      margin-top: -8px;
    }

    /* ── BOTÃO PARÂMETROS ── */
    .btn-params {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 260px;
      height: 56px;
      background: linear-gradient(145deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 100%);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-invert);
      text-decoration: none;
      font-size: .92rem;
      font-weight: 600;
      letter-spacing: .04em;
      box-shadow: 0 4px 18px -6px rgba(0,0,0,.40);
      transition: transform .22s cubic-bezier(.2,.9,.2,1),
                  box-shadow .22s ease,
                  background .22s ease,
                  border-color .22s ease;
      cursor: pointer;
    }
    .btn-params:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 32px -8px rgba(0,0,0,.50);
      border-color: var(--accent);
      background: linear-gradient(145deg, rgba(243,183,104,0.16) 0%, rgba(243,183,104,0.06) 100%);
      color: var(--text-invert);
      text-decoration: none;
    }
    .btn-params:active {
      transform: translateY(-1px) scale(1.01);
    }
    .btn-params .params-icon {
      font-size: 1.1rem;
      color: var(--accent);
    }
    .modules-row-break {
      flex-basis: 100%;
      height: 0;
    }

    /* ── PAINEL DE SUBMODULO ── */
    .submodule-panel {
      width: 100%;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .45s cubic-bezier(.4,0,.2,1),
                  opacity .35s ease,
                  margin-top .45s ease;
      margin-top: 0;
    }
    .submodule-panel.open {
      max-height: 260px;
      opacity: 1;
      margin-top: 28px;
    }
    .submodule-inner {
      padding: 22px 24px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      display: flex;
      align-items: stretch;
      gap: 24px;
      flex-wrap: nowrap;
    }
    .submodule-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .03em;
      white-space: nowrap;
    }
    /* ── DROP ZONE ── */
    .drop-zone {
      flex-shrink: 0;
      width: 480px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px dashed rgba(255,255,255,.30);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      background: rgba(255,255,255,.04);
      position: relative;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(243,183,104,.08);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone .dz-icon {
      font-size: 1.8rem;
      color: rgba(243,183,104,.70);
      pointer-events: none;
    }
    .drop-zone .dz-label {
      font-size: .85rem;
      color: rgba(255,255,255,.65);
      pointer-events: none;
      text-align: center;
      margin: 0;
    }
    .drop-zone .dz-label span {
      color: var(--accent);
      font-weight: 600;
    }
    .drop-zone .dz-file-name {
      font-size: .82rem;
      color: var(--accent);
      font-weight: 600;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
      display: none;
      margin: 0;
    }
    .drop-zone.has-file .dz-label { display: none; }
    .drop-zone.has-file .dz-file-name { display: block; }
    .drop-zone.has-file .dz-icon { color: var(--accent); }
    /* ── LADO DIREITO DO PAINEL ── */
    .submodule-side {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
    }
    .submodule-side .side-label {
      font-size: .82rem;
      color: rgba(255,255,255,.60);
      margin: 0;
    }
    .submodule-side .side-module-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-invert);
      margin: 0;
    }
    .btn-enviar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--accent);
      color: #1a1a1a;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, transform .18s;
      margin-top: 4px;
    }
    .btn-enviar:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }
    .btn-enviar:active { transform: translateY(0); }
    .btn-module.active {
      border-color: var(--accent);
      background: linear-gradient(145deg, rgba(243,183,104,0.22) 0%, rgba(243,183,104,0.09) 100%);
    }
  </style>
</head>
<body>
  <div id="page-enter-overlay" aria-hidden="true"></div>

  <div class="a1control-panel">
    <!-- Topbar -->
    <div class="a1control-topbar">
      <i class="fa-solid fa-chart-pie fa-lg" style="color:var(--accent);"></i>
      <div>
        <div class="app-title">A1 Control</div>
        <p class="app-subtitle">AUTOMAÇÃO | Transformação XML</p>
      </div>
      <a href="/app/" class="btn-voltar">
        <i class="fa-solid fa-arrow-left fa-xs"></i> Voltar
      </a>
    </div>

    <!-- Corpo -->
    <div class="a1control-body">

      <a href="#" class="btn-module" id="btn-construction-dcs" data-module="construction-dcs">
        <i class="fa-solid fa-tower-broadcast module-icon"></i>
        <span class="module-label">Construction DCS</span>
        <span class="module-sublabel">Geração de documentos</span>
      </a>

      <a href="#" class="btn-module" id="btn-as-built" data-module="as-built">
        <i class="fa-solid fa-file-circle-check module-icon"></i>
        <span class="module-label">As Built</span>
        <span class="module-sublabel">Revisão final de documentos</span>
      </a>

      <div class="modules-row-break"></div>

      <!-- Painel de submodulo (surge ao clicar num módulo) -->
      <div class="submodule-panel" id="submodule-panel">
        <div class="submodule-inner">
          <div class="submodule-side">
            <p class="side-label">Módulo selecionado</p>
            <p class="side-module-name" id="side-module-name"></p>
            <button class="btn-enviar" id="btn-enviar" type="button">
              <i class="fa-solid fa-paper-plane"></i> Enviar
            </button>
          </div>
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept=".xml,.csv,.xlsx,.xls">
            <i class="fa-solid fa-cloud-arrow-up dz-icon"></i>
            <p class="dz-label">Arraste o arquivo aqui ou <span>clique para importar</span></p>
            <p class="dz-file-name" id="dz-file-name"></p>
          </div>
        </div>
      </div>

      <div class="modules-row-break"></div>

      <a href="/app/automation/a1control/parametros/" class="btn-params">
        <i class="fa-solid fa-sliders params-icon"></i>
        Parâmetros
      </a>

    </div>
  </div>

  <!-- Scripts -->
  <script src="{% static 'vendor/jquery-3.6/jquery.min.js' %}"></script>
  <script src="{% static 'vendor/bootstrap-4.1/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'js/automation/A1Control/A1Control.js' %}"></script>
  <script>
    /* ── Transição de entrada ── */
    (function () {
      var ov = document.getElementById('page-enter-overlay');
      if (!ov) return;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          ov.classList.add('done');
          ov.addEventListener('transitionend', function () { ov.remove(); }, { once: true });
        });
      });
    })();

    /* ── Submodulos por módulo ── */
    var SUBMODULES = {
      'construction-dcs': { title: 'Construction DCS — Importar arquivo' },
      'as-built':         { title: 'As Built — Importar arquivo' }
    };

    var activeModule = null;
    var panel        = document.getElementById('submodule-panel');
    var sideNameEl   = document.getElementById('side-module-name');
    var dropZone     = document.getElementById('drop-zone');
    var fileInput    = document.getElementById('file-input');
    var fileNameEl   = document.getElementById('dz-file-name');

    function setFile(name) {
      fileNameEl.textContent = name;
      dropZone.classList.add('has-file');
    }

    fileInput.addEventListener('change', function () {
      if (this.files && this.files[0]) setFile(this.files[0].name);
    });

    dropZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      this.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', function () {
      this.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      var files = e.dataTransfer.files;
      if (files && files[0]) setFile(files[0].name);
    });

    document.querySelectorAll('.btn-module[data-module]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        var key = this.getAttribute('data-module');

        if (activeModule === key) {
          panel.classList.remove('open');
          this.classList.remove('active');
          activeModule = null;
          return;
        }

        document.querySelectorAll('.btn-module').forEach(function (b) { b.classList.remove('active'); });
        this.classList.add('active');
        sideNameEl.textContent = SUBMODULES[key].title;
        /* limpa arquivo anterior */
        fileInput.value = '';
        fileNameEl.textContent = '';
        dropZone.classList.remove('has-file');
        panel.classList.add('open');
        activeModule = key;
      });
    });
  </script>
</body>
</html>
