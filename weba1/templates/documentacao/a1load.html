{% load static %}
<!DOCTYPE html>
<html>
<head>
	<title>A1Load</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
	<script type="text/javascript" src="{% static 'js/bootstrap-filestyle.min.js' %}"> </script>
	<meta charset="utf-8">
	<style type="text/css">
		.reset-this {
		all: initial;
		}

		.redo-fieldset {
			border: 1px solid black;
			padding : 20px;
		}

		.redo-legend {
			color: black;
		}

        .legend-style {
            color: black;
            font-size: 20px;
            font-family: Tahoma;
            text-transform: uppercase;
        }

        .label-style {
            font-size: 15px;
            font-family: Tahoma;
            color: black;
        }

		.custom-button {
			padding: 2px;
			color: black;
			background-color: white;
			border: 1px solid #000;
			border-radius: 5px;
			cursor: pointer;
			height: 45px;
			font-size: 15px;
            font-family: Tahoma;
		}

		.custom-button:hover {
			background: #f58c32;
			color: black
		}

         .custom-logo {
			padding: 2px;
			color: black;
			background-color: white;
			border: 1px solid #000;
			border-radius: 5px;
			height: 45px;
		}
	</style>

</head>
<body style="background-color: #f58c32">
	<form action="{% url 'a1load' %}" method="POST" enctype="multipart/form-data">
		{% csrf_token %}
		<fieldset class="reset-this redo-fieldset" style="margin-left: 10px; width: 320px; margin-top: 20px; background-color: #cccccc">
		    <input type="file" id="ant" hidden="hidden" onchange="selectedFile1(event)" name="file1"/>
			<button type="button" id="bot-ant" class="custom-button" onclick="clicked('ant')">Padrão</button>
			<span id="text-ant" class="label-style">Selecione o template.</span>
			<br>
			<br>
		    <input type="file" id="atu" hidden="hidden"  onchange="selectedFile2(event)" name="file2"/>
			<button type="button" id="bot-atu" class="custom-button" onclick="clicked('atu')">Book</button>
			<span id="text-atu" class="label-style">Selecione a capa</span>
			<br>
			<br>
			<button class="custom-button">LOAD</button>
		</fieldset>
	</form>
    <img src="{% static 'img/logo.png' %}" alt="logo" style="margin-left: 10px; margin-top: 10px" class="custom-logo">

	<script type="text/javascript">

		function clicked(name){
			$(`#${name}`).click();
			console.log("oi");
		}

		function selectedFile1(e) {
		    var theFile = e.target.files;
		    if (theFile[0]) {
				$(`#text-ant`).text(theFile[0].name);
		  	} else {
		    	$(`#text-ant`).innerHTML = "template.";
			}
		}

		function selectedFile2(e) {
		    var theFile = e.target.files;
		    if (theFile[0]) {
				$(`#text-atu`).text(theFile[0].name);
		  	} else {
		    	$(`#text-atu`).innerHTML = "capa.";
			}
		}


	</script>
</body>
</html>
